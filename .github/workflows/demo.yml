# Renderiza la demo VHS (docs/demo/demo.tape) a GIF y lo commitea al repo.
# La salida es guionizada (datos inventados) — no usa credenciales ni la web real.
name: Demo GIF

on:
  workflow_dispatch:
  push:
    paths:
      - docs/demo/demo.tape
      - docs/demo/claude-demo.sh
      - .github/workflows/demo.yml

permissions:
  contents: write

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fuentes con emojis y símbolos
        run: sudo apt-get update && sudo apt-get install -y fonts-noto-color-emoji fonts-dejavu

      - name: Render VHS → GIF
        uses: charmbracelet/vhs-action@v2
        with:
          path: docs/demo/demo.tape

      - name: Commit del GIF
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "docs: re-render demo GIF"
          file_pattern: docs/demo/demo.gif
