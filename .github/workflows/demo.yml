# Renderiza la demo VHS (docs/demo/demo.tape) a GIF y lo commitea al repo.
# La salida es guionizada (datos inventados) — no usa credenciales ni la web real.
name: Demo GIF

on:
  workflow_dispatch:
  push:
    paths:
      - docs/demo/demo.tape
      - docs/demo/claude-demo.sh
      - .github/workflows/demo.yml

permissions:
  contents: write

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Dependencias (ffmpeg + fuentes con emoji/símbolos)
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg fonts-noto-color-emoji fonts-dejavu-core

      - name: Instala ttyd
        run: |
          sudo curl -fsSL -o /usr/local/bin/ttyd \
            https://github.com/tsl0922/ttyd/releases/latest/download/ttyd.x86_64
          sudo chmod +x /usr/local/bin/ttyd
          ttyd --version

      - name: Instala vhs (repo apt de Charm)
        run: |
          sudo mkdir -p /etc/apt/keyrings
          curl -fsSL https://repo.charm.sh/apt/gpg.key \
            | sudo gpg --dearmor -o /etc/apt/keyrings/charm.gpg
          echo "deb [signed-by=/etc/apt/keyrings/charm.gpg] https://repo.charm.sh/apt/ * *" \
            | sudo tee /etc/apt/sources.list.d/charm.list
          sudo apt-get update
          sudo apt-get install -y vhs
          vhs --version

      - name: Render VHS → GIF
        run: vhs docs/demo/demo.tape

      - name: Commit del GIF
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "docs: re-render demo GIF"
          file_pattern: docs/demo/demo.gif
